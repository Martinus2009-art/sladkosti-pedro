<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sladkosti do domácnosti</title>

<style>
body{margin:0;font-family:Arial;background:#fff7fb}
header{background:#ff4f93;color:#fff;text-align:center;padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.1);text-align:center}
.card img{width:100%;height:200px;object-fit:contain}
.price{color:#ff4f93;font-size:20px;font-weight:bold}
.btn{background:#ff4f93;color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block;margin-top:10px}
input{padding:10px;margin:10px;width:90%;max-width:400px}
.info{text-align:center;margin-top:10px}
</style>
</head>

<body>

<header>
<h1>Sladkosti do domácnosti 🍬</h1>
<input id="search" placeholder="Hľadať...">
</header>

<div class="info" id="info">Načítavam...</div>
<div class="products" id="products"></div>

<script>
let products = [];
let filtered = [];

const productsEl = document.getElementById("products");
const searchEl = document.getElementById("search");
const infoEl = document.getElementById("info");

// 🔥 OPRAVENÝ FETCH
fetch("products.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP chyba: " + res.status);
    }
    return res.json();
  })
  .then(data => {
    console.log("NAČÍTANÉ:", data);

    products = Array.isArray(data) ? data : [];
    filtered = [...products];

    render();
  })
  .catch(err => {
    console.error("CHYBA FETCH:", err);
    infoEl.textContent = "❌ Nepodarilo sa načítať products.json";
  });

// 🔎 FILTER
searchEl.addEventListener("input", () => {
  const text = searchEl.value.toLowerCase();

  filtered = products.filter(p =>
    (p.name?.sk || "").toLowerCase().includes(text)
  );

  render();
});

// 🧱 RENDER
function render() {
  productsEl.innerHTML = "";

  if (filtered.length === 0) {
    infoEl.textContent = "Žiadne produkty";
    return;
  }

  infoEl.textContent = "Počet produktov: " + filtered.length;

  filtered.forEach(p => {
    const name = p.name?.sk || "Bez názvu";
    const price = p.priceEUR ? p.priceEUR.toFixed(2) : "0.00";
    const img = p.images?.[0] || "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img}" onerror="this.style.display='none'">
      <h3>${name}</h3>
      <div class="price">${price} €</div>
      <a href="${p.url}" target="_blank">
        <button class="btn">Detail</button>
      </a>
    `;

    productsEl.appendChild(div);
  });
}
</script>

</body>
</html>
