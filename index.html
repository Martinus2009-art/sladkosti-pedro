<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sladkosti do domácnosti</title>

  <style>
    :root{
      --bg:#f6f6f6;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --brand:#ff4081;
      --brand-dark:#e73370;
      --radius:14px;
      --shadow:0 8px 24px rgba(0,0,0,.08);
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      background:var(--brand);
      color:#fff;
      padding:20px;
      text-align:center;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      padding:15px;
      background:#fff;
    }

    input{
      padding:10px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
      min-width:250px;
    }

    .cat-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      padding:10px;
    }

    .cat-btn{
      padding:8px 12px;
      border-radius:999px;
      border:none;
      background:#e5e7eb;
      cursor:pointer;
    }

    .cat-btn.active{
      background:var(--brand);
      color:#fff;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#fff;
      border-radius:14px;
      padding:15px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:contain;
    }

    .price{
      color:var(--brand);
      font-weight:bold;
      font-size:18px;
    }
  </style>
</head>

<body>

<header>
  <h1>Sladkosti do domácnosti 🍬</h1>
</header>

<div class="topbar">
  <input id="search" placeholder="Vyhľadať produkt...">
</div>

<div class="cat-buttons" id="categoryButtons"></div>

<div class="products" id="products"></div>

<script>
let products = [];
let filtered = [];
let selectedCategory = "";

const productsEl = document.getElementById("products");
const searchEl = document.getElementById("search");
const categoryButtonsEl = document.getElementById("categoryButtons");

fetch("products.json")
  .then(res => res.json())
  .then(data => {
    products = data;
    filtered = [...products];
    createCategories();
    render();
  });

function createCategories(){
  const set = new Set();

  products.forEach(p=>{
    if(p.cat){
      p.cat.forEach(c=>set.add(c));
    }
  });

  categoryButtonsEl.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "Všetko";
  allBtn.className = "cat-btn active";

  allBtn.onclick = ()=>{
    selectedCategory = "";
    setActive(allBtn);
    applyFilters();
  };

  categoryButtonsEl.appendChild(allBtn);

  [...set].sort().forEach(cat=>{
    const btn = document.createElement("button");
    btn.textContent = cat;
    btn.className = "cat-btn";

    btn.onclick = ()=>{
      selectedCategory = cat;
      setActive(btn);
      applyFilters();
    };

    categoryButtonsEl.appendChild(btn);
  });
}

function setActive(btn){
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function applyFilters(){
  const text = searchEl.value.toLowerCase();

  filtered = products.filter(p=>{
    const name = (p.name?.sk || "").toLowerCase();
    const cats = p.cat || [];

    return (
      (name.includes(text) || cats.join(" ").includes(text)) &&
      (selectedCategory === "" || cats.includes(selectedCategory))
    );
  });

  render();
}

searchEl.addEventListener("input", applyFilters);

function render(){
  productsEl.innerHTML = "";

  filtered.forEach(p=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${p.name.sk}</h3>
      <img src="${p.images[0] || ""}">
      <p class="price">${p.priceEUR.toFixed(2)} €</p>
    `;

    productsEl.appendChild(card);
  });
}
</script>

</body>
</html>
