<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sladkosti do domácnosti</title>

  <style>
    :root{
      --bg:#fff7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --brand:#ff4f93;
      --brand-dark:#e13e7f;
      --brand-light:#ffd7e7;
      --radius:20px;
      --shadow:0 12px 30px rgba(0,0,0,.08);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(to bottom, #fff7fb, #fff);
      color:var(--text);
    }

    header{
      background:linear-gradient(135deg, var(--brand), #ff7fb2);
      color:#fff;
      padding:32px 20px;
      text-align:center;
      box-shadow:0 8px 24px rgba(255,79,147,.25);
    }

    header h1{
      margin:0;
      font-size:34px;
      letter-spacing:0.3px;
    }

    .subtitle{
      margin-top:10px;
      font-size:15px;
      opacity:.95;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      align-items:center;
      padding:18px;
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(6px);
      position:sticky;
      top:0;
      z-index:20;
      box-shadow:0 2px 12px rgba(0,0,0,.05);
    }

    input{
      padding:13px 15px;
      border-radius:14px;
      border:1px solid #f3bfd3;
      font-size:16px;
      min-width:280px;
      background:#fff;
      outline:none;
    }

    input:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(255,79,147,.12);
    }

    .btn{
      background:var(--brand);
      color:#fff;
      border:none;
      padding:12px 18px;
      border-radius:14px;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      font-size:15px;
      font-weight:bold;
      transition:.2s ease;
      box-shadow:0 6px 18px rgba(255,79,147,.25);
    }

    .btn:hover{
      background:var(--brand-dark);
      transform:translateY(-1px);
    }

    .cat-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      padding:18px 20px 0;
      max-width:1300px;
      margin:0 auto;
    }

    .cat-btn{
      padding:10px 14px;
      border-radius:999px;
      border:none;
      background:#ffe7f0;
      color:#7a274c;
      cursor:pointer;
      font-size:14px;
      transition:.2s ease;
    }

    .cat-btn:hover{
      background:#ffd3e5;
      transform:translateY(-1px);
    }

    .cat-btn.active{
      background:var(--brand);
      color:#fff;
      box-shadow:0 6px 18px rgba(255,79,147,.25);
    }

    .wrap{
      max-width:1300px;
      margin:0 auto;
      padding:24px 20px 30px;
    }

    .info{
      color:var(--muted);
      font-size:14px;
      margin-bottom:16px;
      text-align:center;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:24px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:16px;
      text-align:center;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      transition:.25s ease;
      border:1px solid #ffe2ee;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 36px rgba(0,0,0,.1);
    }

    .image-wrap{
      width:100%;
      height:240px;
      border-radius:16px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border:1px solid #f8d7e5;
    }

    .card img{
      width:100%;
      height:240px;
      object-fit:contain;
      display:block;
      background:#fff;
    }

    .img-placeholder{
      height:240px;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff5f8;
      color:#9ca3af;
      font-size:14px;
      border-radius:16px;
    }

    .card h3{
      font-size:18px;
      margin:14px 0 8px;
      min-height:52px;
      line-height:1.35;
    }

    .cats{
      color:var(--muted);
      font-size:12px;
      min-height:34px;
      line-height:1.5;
    }

    .price{
      color:var(--brand);
      font-weight:bold;
      font-size:24px;
      margin-top:12px;
    }

    .card a{
      margin-top:14px;
    }

    .pagination{
      text-align:center;
      padding:28px 0 8px;
    }

    .pagebtn{
      padding:10px 14px;
      margin:4px;
      border:none;
      background:#ffe4ef;
      color:#7a274c;
      cursor:pointer;
      border-radius:10px;
      transition:.2s ease;
    }

    .pagebtn:hover{
      background:#ffd3e5;
    }

    .pagebtn.active{
      background:var(--brand);
      color:#fff;
      box-shadow:0 6px 18px rgba(255,79,147,.25);
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:40px 0;
      grid-column:1 / -1;
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
    }

    footer{
      background:#2a1520;
      color:#fff;
      text-align:center;
      padding:28px 20px;
      margin-top:40px;
    }

    footer p{
      margin:6px 0;
    }

    @media (max-width: 640px){
      header h1{
        font-size:26px;
      }

      .subtitle{
        font-size:14px;
      }

      .topbar{
        padding:16px;
      }

      input, .btn{
        width:100%;
      }

      input{
        min-width:unset;
      }

      .products{
        grid-template-columns:1fr;
      }

      .image-wrap,
      .card img,
      .img-placeholder{
        height:220px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Sladkosti do domácnosti 🍬</h1>
  <div class="subtitle">Sladké dobroty pre každú príležitosť</div>
</header>

<div class="topbar">
  <input id="search" type="text" placeholder="Vyhľadať produkt...">

  <a class="btn" href="https://global.ceskecukrovinky.sk/katalog-2026-1/" target="_blank" rel="noopener">
    Otvoriť katalóg 2026
  </a>
</div>

<div class="cat-buttons" id="categoryButtons"></div>

<div class="wrap">
  <div class="info" id="info">Načítavam produkty...</div>
  <div class="products" id="products"></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>
  <p><strong>Kontakt</strong></p>
  <p>Email: toblovaanna.praca@gmail.com</p>
  <p>Tel: 0908068739</p>
  <p>Facebook: Sladkosti do domácnosti</p>
</footer>

<script>
let products = [];
let filtered = [];
let selectedCategory = "";
let currentPage = 1;
const perPage = 16;

const productsEl = document.getElementById("products");
const searchEl = document.getElementById("search");
const categoryButtonsEl = document.getElementById("categoryButtons");
const infoEl = document.getElementById("info");
const paginationEl = document.getElementById("pagination");

fetch("products.json")
  .then(res => res.json())
  .then(data => {
    products = Array.isArray(data) ? data : [];
    filtered = [...products];
    createCategories();
    render();
  })
  .catch(err => {
    console.error(err);
    infoEl.textContent = "Nepodarilo sa načítať products.json";
  });

function formatCategoryName(cat) {
  const labels = {
    zele: "Želé",
    pelendreky: "Pelendreky",
    pasky: "Pásky",
    lizanky: "Lízanky",
    cukriky: "Cukríky",
    cokolada: "Čokoláda",
    pralinky: "Pralinky",
    orechy: "Orechy",
    oblatky: "Oblátky",
    susienky: "Sušienky",
    tycinky: "Tyčinky",
    proteinove_tycinky: "Proteínové tyčinky",
    lyofilizovane_ovocie: "Lyofilizované ovocie",
    susene_ovocie: "Sušené ovocie",
    semienka: "Semienka",
    bezlepkove: "Bezlepkové",
    hracky: "Hračky",
    reklamne_predmety: "Reklamné predmety",
    velkonocne_vajicka: "Veľkonočné vajíčka",
    zdrava_vyziva: "Zdravá výživa",
    kysle: "Kyslé",
    mix: "Mix",
    akcia: "Akcia",
    valentyn: "Valentín",
    mikulas: "Mikuláš",
    vanoce: "Vianoce",
    karnevaly: "Karnevaly",
    velikonoce: "Veľká noc"
  };

  return labels[cat] || cat.replaceAll("_", " ");
}

function hasRealImage(product) {
  return !!(
    product.images &&
    product.images[0] &&
    product.images[0].trim() !== ""
  );
}

function createCategories() {
  const set = new Set();

  products.forEach(p => {
    if (Array.isArray(p.cat)) {
      p.cat.forEach(c => {
        if (c && c.trim() !== "") set.add(c);
      });
    }
  });

  categoryButtonsEl.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "Všetko";
  allBtn.className = "cat-btn active";
  allBtn.onclick = () => {
    selectedCategory = "";
    setActive(allBtn);
    applyFilters();
  };
  categoryButtonsEl.appendChild(allBtn);

  [...set].sort((a, b) => a.localeCompare(b, "sk")).forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = formatCategoryName(cat);
    btn.className = "cat-btn";

    btn.onclick = () => {
      selectedCategory = cat;
      setActive(btn);
      applyFilters();
    };

    categoryButtonsEl.appendChild(btn);
  });
}

function setActive(btn) {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function applyFilters() {
  const text = searchEl.value.toLowerCase().trim();

  filtered = products.filter(p => {
    const name = (p.name?.sk || "").toLowerCase();
    const cats = Array.isArray(p.cat) ? p.cat : [];

    const matchesText =
      text === "" ||
      name.includes(text) ||
      cats.join(" ").toLowerCase().includes(text);

    const matchesCategory =
      selectedCategory === "" || cats.includes(selectedCategory);

    return matchesText && matchesCategory;
  });

  currentPage = 1;
  render();
}

searchEl.addEventListener("input", applyFilters);

function render() {
  productsEl.innerHTML = "";

  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  const start = (currentPage - 1) * perPage;
  const pageProducts = filtered.slice(start, start + perPage);

  if (total === 0) {
    infoEl.textContent = "Nenašli sa žiadne produkty.";
    productsEl.innerHTML = '<div class="empty">Žiadne produkty.</div>';
    paginationEl.innerHTML = "";
    return;
  }

  infoEl.textContent = `Zobrazené ${start + 1}-${Math.min(start + perPage, total)} z ${total} produktov`;

  pageProducts.forEach(p => {
    const name = p.name?.sk || "Bez názvu";
    const price = typeof p.priceEUR === "number"
      ? p.priceEUR.toFixed(2).replace(".", ",")
      : "0,00";
    const cats = Array.isArray(p.cat)
      ? p.cat.map(formatCategoryName).join(", ")
      : "";

    const imageHtml = hasRealImage(p)
      ? `<div class="image-wrap"><img src="${p.images[0]}" alt="${name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;img-placeholder&quot;>Bez obrázka</div>'"></div>`
      : `<div class="img-placeholder">Bez obrázka</div>`;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      ${imageHtml}
      <h3>${name}</h3>
      <div class="cats">${cats || "Bez kategórie"}</div>
      <div class="price">${price} €</div>
      <a href="${p.url || '#'}" target="_blank" rel="noopener">
        <button class="btn">Detail produktu</button>
      </a>
    `;

    productsEl.appendChild(card);
  });

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  paginationEl.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "pagebtn";
    if (i === currentPage) btn.classList.add("active");

    btn.onclick = () => {
      currentPage = i;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    paginationEl.appendChild(btn);
  }
}
</script>

</body>
</html>
