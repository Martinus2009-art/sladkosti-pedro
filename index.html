<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sladkosti do domácnosti</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fff7fb;
}

header {
  background:#ff4f93;
  color:#fff;
  text-align:center;
  padding:25px;
}

input {
  margin-top:10px;
  padding:10px;
  width:90%;
  max-width:400px;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img {
  width:100%;
  height:200px;
  object-fit:contain;
}

.price {
  color:#ff4f93;
  font-size:20px;
  font-weight:bold;
}

.btn {
  background:#ff4f93;
  color:#fff;
  border:none;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  cursor:pointer;
}

footer {
  background:#2a1520;
  color:#fff;
  text-align:center;
  padding:20px;
}

.info {
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>Sladkosti do domácnosti 🍬</h1>
<input id="search" placeholder="Vyhľadať produkt...">
</header>

<div class="info" id="info">Načítavam produkty...</div>
<div class="products" id="products"></div>

<footer>
<p><strong>Kontakt</strong></p>
<p>Email: toblovaanna.praca@gmail.com</p>
<p>Tel: 0908068739</p>
<p>Facebook: Sladkosti do domácnosti</p>
</footer>

<script>
let products = [];
let filtered = [];

const productsEl = document.getElementById("products");
const searchEl = document.getElementById("search");
const infoEl = document.getElementById("info");

// 🔥 NAČÍTANIE JSON (OPRAVA)
fetch("products.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP chyba: " + res.status);
    }
    return res.json();
  })
  .then(data => {
    console.log("NAČÍTANÉ:", data);

    products = Array.isArray(data) ? data : [];
    filtered = [...products];

    render();
  })
  .catch(err => {
    console.error("CHYBA:", err);
    infoEl.textContent = "❌ Nepodarilo sa načítať products.json";
  });

// 🔍 HĽADANIE
searchEl.addEventListener("input", () => {
  const text = searchEl.value.toLowerCase();

  filtered = products.filter(p =>
    (p.name?.sk || "").toLowerCase().includes(text)
  );

  render();
});

// 🧱 RENDER PRODUKTOV
function render() {
  productsEl.innerHTML = "";

  if (filtered.length === 0) {
    infoEl.textContent = "Žiadne produkty";
    return;
  }

  infoEl.textContent = "Počet produktov: " + filtered.length;

  filtered.forEach(p => {
    const name = p.name?.sk || "Bez názvu";
    const price = p.priceEUR ? p.priceEUR.toFixed(2) : "0.00";
    const img = p.images?.[0] || "";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${img}" onerror="this.style.display='none'">
      <h3>${name}</h3>
      <div class="price">${price} €</div>
      <a href="${p.url}" target="_blank">
        <button class="btn">Detail produktu</button>
      </a>
    `;

    productsEl.appendChild(card);
  });
}
</script>

</body>
</html>
