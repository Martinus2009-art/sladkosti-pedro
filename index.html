<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sladkosti do domácnosti</title>

  <style>
    :root{
      --bg:#f6f6f6;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --brand:#ff4081;
      --brand-dark:#e73370;
      --radius:14px;
      --shadow:0 8px 24px rgba(0,0,0,.08);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      background:var(--brand);
      color:#fff;
      padding:20px;
      text-align:center;
    }

    header h1{
      margin:0;
      font-size:30px;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      align-items:center;
      padding:15px;
      background:#fff;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }

    input{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
      min-width:250px;
    }

    .btn{
      background:var(--brand);
      color:#fff;
      border:none;
      padding:10px 16px;
      border-radius:10px;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      font-size:15px;
    }

    .btn:hover{
      background:var(--brand-dark);
    }

    .cat-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      padding:14px 20px 0;
      max-width:1200px;
      margin:0 auto;
    }

    .cat-btn{
      padding:8px 12px;
      border-radius:999px;
      border:none;
      background:#e5e7eb;
      cursor:pointer;
      font-size:14px;
    }

    .cat-btn:hover{
      background:#d1d5db;
    }

    .cat-btn.active{
      background:var(--brand);
      color:#fff;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }

    .info{
      color:var(--muted);
      font-size:14px;
      margin-bottom:8px;
      text-align:center;
    }

    .loading-note{
      color:var(--muted);
      font-size:13px;
      margin-bottom:14px;
      text-align:center;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#fff;
      border-radius:14px;
      padding:15px;
      text-align:center;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:contain;
      border-radius:10px;
      background:#fff;
    }

    .img-placeholder{
      height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f3f4f6;
      border-radius:10px;
      color:#6b7280;
      font-size:14px;
    }

    .card h3{
      font-size:17px;
      margin:12px 0 8px;
      min-height:48px;
    }

    .cats{
      color:var(--muted);
      font-size:12px;
      min-height:18px;
    }

    .price{
      color:var(--brand);
      font-weight:bold;
      font-size:18px;
      margin-top:10px;
    }

    .card a{
      margin-top:12px;
    }

    .pagination{
      text-align:center;
      padding:24px 0 8px;
    }

    .pagebtn{
      padding:8px 12px;
      margin:4px;
      border:none;
      background:#e5e7eb;
      cursor:pointer;
      border-radius:8px;
    }

    .pagebtn.active{
      background:var(--brand);
      color:#fff;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:40px 0;
      grid-column:1 / -1;
    }

    footer{
      background:#222;
      color:#fff;
      text-align:center;
      padding:24px 20px;
      margin-top:40px;
    }

    @media (max-width: 640px){
      header h1{
        font-size:24px;
      }

      .topbar{
        padding:16px;
      }

      input, .btn{
        width:100%;
      }

      input{
        min-width:unset;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Sladkosti do domácnosti 🍬</h1>
</header>

<div class="topbar">
  <input id="search" type="text" placeholder="Vyhľadať produkt...">

  <a class="btn" href="https://global.ceskecukrovinky.sk/katalog-2026-1/" target="_blank" rel="noopener">
    Otvoriť katalóg 2026
  </a>
</div>

<div class="cat-buttons" id="categoryButtons"></div>

<div class="wrap">
  <div class="info" id="info">Načítavam produkty...</div>
  <div class="loading-note" id="loadingNote"></div>
  <div class="products" id="products"></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>
  <p><strong>Kontakt</strong></p>
  <p>Email: toblovaanna.praca@gmail.com</p>
  <p>Tel: 0908068739</p>
  <p>Facebook: Sladkosti do domácnosti</p>
</footer>

<script>
let products = [];
let filtered = [];
let selectedCategory = "";
let currentPage = 1;
const perPage = 20;

const productsEl = document.getElementById("products");
const searchEl = document.getElementById("search");
const categoryButtonsEl = document.getElementById("categoryButtons");
const infoEl = document.getElementById("info");
const loadingNoteEl = document.getElementById("loadingNote");
const paginationEl = document.getElementById("pagination");

fetch("products.json")
  .then(res => res.json())
  .then(data => {
    products = Array.isArray(data) ? data : [];
    filtered = [...products];
    createCategories();
    render();
  })
  .catch(err => {
    console.error(err);
    infoEl.textContent = "Nepodarilo sa načítať products.json";
  });

function formatCategoryName(cat) {
  const labels = {
    zele: "Želé",
    pelendreky: "Pelendreky",
    pasky: "Pásky",
    lizanky: "Lízanky",
    cukriky: "Cukríky",
    cokolada: "Čokoláda",
    pralinky: "Pralinky",
    orechy: "Orechy",
    oblatky: "Oblátky",
    susienky: "Sušienky",
    tycinky: "Tyčinky",
    proteinove_tycinky: "Proteínové tyčinky",
    lyofilizovane_ovocie: "Lyofilizované ovocie",
    susene_ovocie: "Sušené ovocie",
    semienka: "Semienka",
    bezlepkove: "Bezlepkové",
    hracky: "Hračky",
    reklamne_predmety: "Reklamné predmety",
    velkonocne_vajicka: "Veľkonočné vajíčka",
    kysle: "Kyslé",
    mix: "Mix",
    akcia: "Akcia"
  };

  return labels[cat] || cat.replaceAll("_", " ");
}

function createCategories(){
  const set = new Set();

  products.forEach(p => {
    if (Array.isArray(p.cat)) {
      p.cat.forEach(c => {
        if (c && c.trim() !== "") set.add(c);
      });
    }
  });

  categoryButtonsEl.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "Všetko";
  allBtn.className = "cat-btn active";
  allBtn.onclick = () => {
    selectedCategory = "";
    setActive(allBtn);
    applyFilters();
  };
  categoryButtonsEl.appendChild(allBtn);

  [...set].sort((a, b) => a.localeCompare(b, "sk")).forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = formatCategoryName(cat);
    btn.className = "cat-btn";

    btn.onclick = () => {
      selectedCategory = cat;
      setActive(btn);
      applyFilters();
    };

    categoryButtonsEl.appendChild(btn);
  });
}

function setActive(btn){
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function applyFilters(){
  const text = searchEl.value.toLowerCase().trim();

  filtered = products.filter(p => {
    const name = (p.name?.sk || "").toLowerCase();
    const cats = Array.isArray(p.cat) ? p.cat : [];

    const matchesText =
      text === "" ||
      name.includes(text) ||
      cats.join(" ").toLowerCase().includes(text);

    const matchesCategory =
      selectedCategory === "" || cats.includes(selectedCategory);

    return matchesText && matchesCategory;
  });

  currentPage = 1;
  render();
}

searchEl.addEventListener("input", applyFilters);

function hasRealImage(product) {
  return !!(
    product.images &&
    product.images[0] &&
    !product.images[0].startsWith("data:image") &&
    product.images[0].trim() !== ""
  );
}

async function getRealImageFromDetail(product) {
  if (!product.url) return "";

  const cacheKey = "imgcache_" + product.id;
  const cached = localStorage.getItem(cacheKey);
  if (cached) return cached;

  try {
    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(product.url);
    const response = await fetch(proxyUrl);
    const html = await response.text();

    const ogMatch = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i);
    const twitterMatch = html.match(/<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i);
    const imgMatch = html.match(/https:\/\/global\.ceskecukrovinky\.sk\/[^"' >]+?\.(jpg|jpeg|png|webp)/i);

    const foundImage =
      (ogMatch && ogMatch[1]) ||
      (twitterMatch && twitterMatch[1]) ||
      (imgMatch && imgMatch[0]) ||
      "";

    if (foundImage) {
      localStorage.setItem(cacheKey, foundImage);
    }

    return foundImage;
  } catch (error) {
    console.error("Nepodarilo sa načítať detail produktu:", product.url, error);
    return "";
  }
}

async function render(){
  productsEl.innerHTML = "";

  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  const start = (currentPage - 1) * perPage;
  const pageProducts = filtered.slice(start, start + perPage);

  if (total === 0) {
    infoEl.textContent = "Nenašli sa žiadne produkty.";
    loadingNoteEl.textContent = "";
    productsEl.innerHTML = '<div class="empty">Žiadne produkty.</div>';
    paginationEl.innerHTML = "";
    return;
  }

  infoEl.textContent = `Zobrazené ${start + 1}-${Math.min(start + perPage, total)} z ${total} produktov`;
  loadingNoteEl.textContent = "Ak niektoré obrázky chýbali, stránka si ich teraz sama dopĺňa z detailu produktu.";

  for (const p of pageProducts) {
    const name = p.name?.sk || "Bez názvu";
    const imageHtml = hasRealImage(p)
      ? `<img src="${p.images[0]}" alt="${name}" loading="lazy" onerror="this.outerHTML='<div class=&quot;img-placeholder&quot;>Bez obrázka</div>'">`
      : `<div class="img-placeholder">Načítavam obrázok…</div>`;
    const price = typeof p.priceEUR === "number" ? p.priceEUR.toFixed(2).replace(".", ",") : "0,00";
    const cats = Array.isArray(p.cat) ? p.cat.map(formatCategoryName).join(", ") : "";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="image-slot">${imageHtml}</div>
      <h3>${name}</h3>
      <div class="cats">${cats || "Bez kategórie"}</div>
      <div class="price">${price} €</div>
      <a href="${p.url || '#'}" target="_blank" rel="noopener">
        <button class="btn">Detail produktu</button>
      </a>
    `;

    productsEl.appendChild(card);

    if (!hasRealImage(p)) {
      getRealImageFromDetail(p).then(image => {
        const slot = card.querySelector(".image-slot");
        if (!slot) return;

        if (image) {
          slot.innerHTML = `<img src="${image}" alt="${name}" loading="lazy" onerror="this.outerHTML='<div class=&quot;img-placeholder&quot;>Bez obrázka</div>'">`;
        } else {
          slot.innerHTML = `<div class="img-placeholder">Bez obrázka</div>`;
        }
      });
    }
  }

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  paginationEl.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "pagebtn";
    if (i === currentPage) btn.classList.add("active");

    btn.onclick = () => {
      currentPage = i;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    paginationEl.appendChild(btn);
  }
}
</script>

</body>
</html>
