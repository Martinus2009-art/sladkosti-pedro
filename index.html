<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sladkosti Anna | Sladkosti do domácnosti a Pedro cukrovinky</title>

  <meta name="description" content="Sladkosti Anna ponúka sladkosti do domácnosti, Pedro cukrovinky, želé, pelendreky, lízatká a čokoládu na objednávku.">
  <meta name="keywords" content="sladkosti, Pedro sladkosti, cukrovinky, želé, pelendreky, sladkosti Trnava">
  <meta name="author" content="Sladkosti Anna">

  <meta property="og:title" content="Sladkosti Anna">
  <meta property="og:description" content="Sladkosti do domácnosti a Pedro cukrovinky na objednávku">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sladkostianna.sk/">

  <link rel="canonical" href="https://sladkostianna.sk/">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fff7fb;
    }

    header {
      background: #ff4f93;
      color: white;
      text-align: center;
      padding: 30px;
    }

    input {
      padding: 12px;
      width: 90%;
      max-width: 400px;
    }

    .btn {
      background: #ff4f93;
      color: white;
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .price {
      color: #ff4f93;
      font-size: 20px;
      font-weight: bold;
    }

    form {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    footer {
      background: #2a1520;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Sladkosti Anna 🍬</h1>

  <input id="search" placeholder="Vyhľadať produkt...">

  <br><br>

  <a class="btn" href="https://global.ceskecukrovinky.sk/katalog-2026-1/" target="_blank">
    Otvoriť katalóg
  </a>
</header>

<div id="products" class="products"></div>

<!-- FORMULÁR -->
<form action="https://formsubmit.co/toblovaanna.praca@gmail.com" method="POST">
  <h2>Objednávka</h2>

  <input type="text" name="meno" placeholder="Vaše meno" required><br><br>
  <input type="email" name="email" placeholder="Email" required><br><br>
  <input type="text" name="telefon" placeholder="Telefón"><br><br>
  <input type="text" name="adresa" placeholder="Adresa doručenia" required><br><br>

  <textarea name="sprava" placeholder="Čo si chcete objednať?" required></textarea><br><br>

  <button type="submit" class="btn">Odoslať objednávku</button>
</form>

<footer>
  <p><strong>Kontakt</strong></p>
  <p>Email: toblovaanna.praca@gmail.com</p>
  <p>Tel: 0908068739</p>
</footer>

<script>
let products = [];

fetch("products.json")
  .then(res => res.json())
  .then(data => {
    products = data;
    render(products);
  });

function render(list) {
  const el = document.getElementById("products");
  el.innerHTML = "";

  list.forEach(p => {
    el.innerHTML += `
      <div class="card">
        <img src="${p.images?.[0] || ''}" style="width:100%;height:200px;object-fit:contain">
        <h3>${p.name?.sk || ""}</h3>
        <div class="price">${p.priceEUR} €</div>
        <a href="${p.url}" target="_blank">
          <button class="btn">Detail</button>
        </a>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", e => {
  const t = e.target.value.toLowerCase();
  render(products.filter(p =>
    (p.name?.sk || "").toLowerCase().includes(t)
  ));
});
</script>

</body>
</html>
